<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathQuest — Forteresse du Savoir</title>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600;800&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --stone: #2a2118; --parchment: #f5e6c8; --parchment-dark: #e8d4a8;
    --gold: #d4a017; --gold-light: #f0c040; --ember: #c0392b;
    --ember-light: #e74c3c; --moss: #2d5a27; --moss-light: #4a8f42;
    --sky: #1a3a5c; --sky-light: #2e6da4; --silver: #8a9ba8;
    --xp-color: #9b59b6; --xp-light: #c39bd3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Crimson Text', serif; background: var(--stone); min-height: 100vh; overflow-x: hidden; color: var(--parchment); }
  .bg-castle { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at 50% 110%, #1a0a00 0%, transparent 60%), radial-gradient(ellipse at 20% 80%, #0d1f0d 0%, transparent 40%), radial-gradient(ellipse at 80% 80%, #0d0d1f 0%, transparent 40%), linear-gradient(180deg, #0a0a1a 0%, #1a1208 40%, #0d0a05 100%); }
  .stars { position: fixed; inset: 0; z-index: 1; background-image: radial-gradient(1px 1px at 10% 15%, rgba(255,255,200,0.8) 0%, transparent 100%), radial-gradient(1px 1px at 25% 8%, rgba(255,255,200,0.6) 0%, transparent 100%), radial-gradient(1px 1px at 40% 20%, rgba(255,255,200,0.9) 0%, transparent 100%); }
  .moon { position: fixed; top: 40px; right: 80px; z-index: 2; width: 70px; height: 70px; background: radial-gradient(circle at 40% 40%, #fff9e0, #f0d060 50%, #c8a020); border-radius: 50%; box-shadow: 0 0 30px 10px rgba(240,200,60,0.3); animation: moonGlow 4s ease-in-out infinite alternate; }
  @keyframes moonGlow { from { box-shadow: 0 0 30px 10px rgba(240,200,60,0.3); } to { box-shadow: 0 0 40px 15px rgba(240,200,60,0.5); } }
  .castle-silhouette { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2; height: 200px; background: #050505; clip-path: polygon(0% 100%, 0% 60%, 5% 35%, 10% 60%, 15% 20%, 25% 35%, 40% 40%, 50% 55%, 60% 60%, 70% 42%, 80% 55%, 90% 28%, 100% 50%, 100% 100%); }
  .screen { position: relative; z-index: 10; display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .panel { background: linear-gradient(145deg, var(--parchment) 0%, var(--parchment-dark) 60%, #d4c090 100%); border: 3px solid var(--gold); border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,0.8); color: var(--stone); position: relative; padding: 40px; text-align: center; width: 100%; max-width: 420px; }
  .logo-title { font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 800; }
  .form-group { margin-bottom: 16px; text-align: left; }
  .form-label { font-family: 'Cinzel', serif; font-size: 0.75rem; display: block; margin-bottom: 6px; color: #6b5020; }
  .form-input { width: 100%; padding: 10px; border: 2px solid #b89040; border-radius: 3px; }
  .btn { font-family: 'Cinzel', serif; padding: 12px 28px; cursor: pointer; border: none; border-radius: 3px; width: 100%; }
  .btn-gold { background: linear-gradient(135deg, #d4a017, #f0c040); color: var(--stone); font-weight: 600; }
  .error-msg { color: var(--ember); font-style: italic; margin-top: 8px; min-height: 20px; }
  .app-header { width: 100%; max-width: 700px; display: flex; justify-content: space-between; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 4px; margin-bottom: 15px; }
  .xp-bar-wrap { width: 120px; height: 8px; background: rgba(0,0,0,0.4); border-radius: 10px; margin-top: 5px; }
  .xp-bar-fill { height: 100%; background: var(--xp-color); width: 0%; transition: width 0.5s; }
  .feedback-box { display: none; padding: 10px; margin: 10px 0; border-radius: 4px; }
  .feedback-box.correct { display: block; background: rgba(46,204,113,0.2); border: 1px solid var(--moss); }
  .feedback-box.wrong { display: block; background: rgba(192,57,43,0.2); border: 1px solid var(--ember); }
</style>
</head>
<body>

<div class="bg-castle"></div>
<div class="stars"></div>
<div class="moon"></div>
<div class="castle-silhouette"></div>

<div class="screen active" id="loginScreen">
  <div class="panel">
    <div class="logo-title">MathQuest</div>
    <div class="logo-sub">Forteresse du Savoir</div>
    <div class="form-group">
      <label class="form-label">Identifiant</label>
      <input class="form-input" id="username" type="text" placeholder="prenom" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input class="form-input" id="password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
    </div>
    <div class="error-msg" id="loginError"></div>
    <button class="btn btn-gold" onclick="login()">⚔️ Entrer dans la forteresse</button>
  </div>
</div>

<div class="screen" id="appScreen">
  <div class="app-header">
    <div><span id="playerAvatar">🧙</span> <span id="playerName">Aventurier</span></div>
    <div>
        <div id="xpValue">0 XP</div>
        <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xpBar"></div></div>
    </div>
    <button onclick="logout()" style="background:none; border:1px solid var(--gold); color:white; cursor:pointer">Quitter</button>
  </div>
  
  <div class="panel" id="questionCard" style="max-width: 700px;">
    <div id="qTheme" style="font-weight:bold; color:var(--moss)">Thème</div>
    <div id="qText" style="font-size:1.5rem; margin:15px 0;">Question ?</div>
    <input type="number" id="answerInput" class="form-input" style="width:200px; text-align:center; font-size:1.5rem;">
    <div class="feedback-box" id="feedbackBox">
        <div id="feedbackTitle"></div>
    </div>
    <button class="btn btn-gold" id="btnValidate" onclick="validate()" style="margin-top:15px">⚔️ Valider</button>
    <button class="btn btn-gold" id="btnNext" onclick="nextQuestion()" style="margin-top:15px; display:none; background:var(--sky)">Suivant ➡️</button>
  </div>
</div>

<div class="screen" id="endScreen">
    <div class="panel">
        <h2>Session Terminée !</h2>
        <div id="endScore" style="font-size:3rem; margin:20px 0;">0/5</div>
        <button class="btn btn-gold" onclick="location.reload()">🔄 Rejouer</button>
    </div>
</div>

<script type="module">
console.log("🚀 Script initialisé");
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6V0Jb1GCiwNDODsfz1XoCugYfC_t4A8c",
  authDomain: "arithmos-ac508.firebaseapp.com",
  projectId: "arithmos-ac508",
  storageBucket: "arithmos-ac508.firebasestorage.app",
  messagingSenderId: "1050947599463",
  appId: "1:1050947599463:web:7bb6dc74a9bce81a3b68c2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
console.log("✅ Firebase connecté");

let currentUser = null;
let gameState = { xp: 0 };
let currentQ = null;
let session = { score: 0, count: 0 };

window.login = async function() {
  console.log("Attempting login...");
  const emailInput = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const email = emailInput.includes('@') ? emailInput : emailInput + '@arithmos.fr';
  
  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    currentUser = cred.user;
    console.log("Utilisateur connecté :", currentUser.uid);
    
    const snap = await getDoc(doc(db, 'eleves', currentUser.uid));
    if (snap.exists()) {
        gameState = snap.data();
    } else {
        gameState = { xp: 0, todayParticipations: 0 };
        await setDoc(doc(db, 'eleves', currentUser.uid), gameState);
    }
    
    startApp();
  } catch (e) {
    console.error("Erreur login:", e);
    document.getElementById('loginError').textContent = "Identifiant ou mot de passe incorrect.";
  }
};

function startApp() {
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('playerName').textContent = currentUser.email.split('@')[0];
  updateUI();
  generateQuestion();
}

function updateUI() {
    document.getElementById('xpValue').textContent = gameState.xp + " XP";
    const progress = (gameState.xp % 100);
    document.getElementById('xpBar').style.width = progress + "%";
}

function generateQuestion() {
    const a = Math.floor(Math.random() * 10) + 1;
    const b = Math.floor(Math.random() * 10) + 1;
    currentQ = { text: `Combien font ${a} x ${b} ?`, answer: a * b, theme: "Calcul Mental" };
    
    document.getElementById('qText').textContent = currentQ.text;
    document.getElementById('qTheme').textContent = currentQ.theme;
    document.getElementById('answerInput').value = "";
    document.getElementById('feedbackBox').style.display = "none";
    document.getElementById('btnValidate').style.display = "block";
    document.getElementById('btnNext').style.display = "none";
}

window.validate = async function() {
    const userAns = parseInt(document.getElementById('answerInput').value);
    const box = document.getElementById('feedbackBox');
    const isCorrect = userAns === currentQ.answer;
    
    box.style.display = "block";
    box.className = "feedback-box " + (isCorrect ? "correct" : "wrong");
    document.getElementById('feedbackTitle').textContent = isCorrect ? "Bravo ! +15 XP" : "Raté... La réponse était " + currentQ.answer;
    
    if (isCorrect) {
        gameState.xp += 15;
        session.score++;
    } else {
        gameState.xp += 3;
    }
    
    await setDoc(doc(db, 'eleves', currentUser.uid), gameState);
    updateUI();
    document.getElementById('btnValidate').style.display = "none";
    document.getElementById('btnNext').style.display = "block";
};

window.nextQuestion = function() {
    session.count++;
    if (session.count >= 5) {
        document.getElementById('appScreen').classList.remove('active');
        document.getElementById('endScreen').classList.add('active');
        document.getElementById('endScore').textContent = session.score + "/5";
    } else {
        generateQuestion();
    }
};

window.logout = () => { signOut(auth); location.reload(); };

</script>
</body>
</html>
